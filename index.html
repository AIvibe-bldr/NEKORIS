<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホ対応 viewport（dvh 対応・ノッチ考慮） -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>テトリス</title>

  <style>
    /* ===== リセット ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Meiryo", sans-serif;
      background:
        radial-gradient(circle at top, #1d2755 0, #050818 55%, #02030a 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;        /* 横スクロール禁止 */
    }

    /* ===== 共通レイアウト（PC 基準）===== */

    .app-shell {
      width: 100%;
      max-width: 1200px;
      padding: 24px;
    }

    /* PC では「左右デコ + 中央ゲーム」構成 */
    .app-frame {
      display: grid;
      grid-template-columns: 1fr minmax(0, 920px) 1fr;
      gap: 24px;
      align-items: stretch;
    }

    /* 左右ネオン背景パネル（PC用） */
    .side-deco {
      border-radius: 24px;
      background: radial-gradient(circle at center, rgba(0,255,255,0.16), transparent 70%);
      opacity: 0.7;
    }

    /* 中央ゲームカード */
    .game-card {
      border-radius: 24px;
      padding: 24px 28px;
      background:
        radial-gradient(circle at top left, rgba(0,255,255,0.12), transparent 60%),
        radial-gradient(circle at bottom right, rgba(123,47,247,0.18), transparent 65%),
        rgba(10, 13, 32, 0.95);
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(0, 255, 255, 0.25);
    }

    /* ゲームコンテナ（PC：ボード + サイドパネル 2カラム） */
    .game-container {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ===== ゲーム盤面 ===== */
    .board-wrapper {
      flex: 0 0 360px;
      max-width: 360px;
      border-radius: 18px;
      padding: 8px;
      background: rgba(3, 8, 24, 0.95);
      box-shadow:
        0 0 32px rgba(0, 255, 255, 0.25),
        inset 0 0 20px rgba(0, 0, 0, 0.7);
    }

    /* 盤面キャンバス（内部ロジック上は 10x20 想定） */
    canvas#board {
      display: block;
      width: 100%;
      height: 100%;
      aspect-ratio: 1 / 2; /* 見た目比率のみ固定 */
      background: radial-gradient(circle at top, #050816 0, #000 60%);
      border-radius: 14px;
      box-shadow: 0 0 18px rgba(0, 255, 255, 0.4);
    }

    /* ===== 右側情報パネル（PC）===== */
    .side-panel {
      flex: 0 0 220px;
      max-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel-box {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(8, 12, 30, 0.95);
      box-shadow:
        0 0 16px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(0, 255, 255, 0.12);
    }

    .panel-box h3 {
      font-size: 12px;
      margin-bottom: 6px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .panel-box .value {
      font-size: 28px;
      font-weight: 700;
      color: #00e5ff;
      text-shadow: 0 0 8px rgba(0, 255, 255, 0.7);
    }

    canvas#next {
      display: block;
      margin: 4px auto 0;
      width: 160px;
      height: 160px;
      background: #050815;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.9);
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      color: #fff;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      background: linear-gradient(135deg, #00bcd4, #7b2ff7);
      box-shadow: 0 0 16px rgba(0, 188, 212, 0.6);
      white-space: nowrap;   /* ボタン文字が切れないようにする */
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 0 10px rgba(0, 188, 212, 0.4);
    }

    /* ===== スマホレイアウト（盤面主役・縦長・1画面完結 + 下部パネル） ===== */
    @media (max-width: 768px) {
      /* 上部ヘッダー帯：ステータス */
      .mobile-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 2px 6px 6px;
      }

      .mobile-header .header-stat {
        flex: 1;
        min-width: 0;
        text-align: center;
      }

      .mobile-header .label {
        display: block;
        font-size: 9px;
        opacity: 0.75;
        letter-spacing: 0.3px;
        line-height: 1.2;
      }

      .mobile-header .value {
        display: block;
        font-size: 14px;
        font-weight: 800;
        color: #00e5ff;
        text-shadow: 0 0 8px rgba(0, 255, 255, 0.55);
        line-height: 1.2;
      }

      html {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        min-height: 100%;
        height: 100dvh;
        max-height: 100dvh;
        overflow: hidden;
        align-items: stretch;
        padding: 0;
      }

      .app-shell {
        padding: 6px 8px;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      .app-frame {
        display: block;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      .side-deco {
        display: none;
      }

      .game-card {
        padding: 6px 8px;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        border-radius: 12px;
        box-shadow: 0 0 12px rgba(0, 255, 255, 0.15);
        background:
          radial-gradient(circle at top, rgba(0,255,255,0.12), transparent 55%),
          rgba(5, 8, 24, 0.97);
      }

      .game-container {
        position: relative;
        display: flex;
        flex-direction: row;        /* 左: board / 右: HUD の2カラム */
        align-items: flex-start;
        justify-content: center;
        gap: 8px;
        width: 100%;
        max-width: none;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      /* 盤面：主役。左カラムに配置（横幅は JS で決まる） */
      .board-wrapper {
        flex: 0 0 auto;
        padding: 4px;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        border-radius: 12px;
        box-shadow: 0 0 16px rgba(0, 255, 255, 0.2);
      }

      .board-wrapper canvas#board {
        display: block;
        margin: 0;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.25);
      }

      /* ポーズ時ブラックアウト */
      .pause-overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.9);
        border-radius: 12px;
        z-index: 3;
      }

      .pause-overlay.is-active {
        display: flex;
      }

      .end-btn {
        width: min(220px, 100%);
        padding: 10px 12px;
        border-radius: 10px;
        background: linear-gradient(135deg, #ff5252, #7b2ff7);
        box-shadow: 0 0 16px rgba(255, 82, 82, 0.45);
      }

      /* HUD カラム：右側の余白帯を専用領域として利用 */
      .hud-column {
        flex: 0 0 92px;            /* HUD の固定幅（board 計算時に控除する） */
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
        gap: 8px;
        padding-top: 8px;
      }

      /* NEXT：HUD カラム上部に表示する小型ウィジェット */
      .next-widget {
        padding: 2px 4px 4px;
        border-radius: 8px;
        background: rgba(4, 10, 32, 0.9);
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .next-widget h3 {
        font-size: 9px;
        margin-bottom: 1px;
        line-height: 1.1;
      }

      .next-widget canvas#next {
        display: block;
        width: 56px;
        height: 56px;
        max-width: 56px;
        max-height: 56px;
        border-radius: 4px;
        box-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
      }

      /* 下部ステータス/操作/折りたたみバーは廃止（side-panel はモバイルで非表示） */
      .side-panel,
      #mobilePanelToggle {
        display: none !important;
      }

      /* ボタン：HUD 内では縦並び、他では必要に応じてレイアウト */
      .button-group {
        flex-direction: column;
        justify-content: flex-start;
        gap: 8px;
        margin-top: 0;
      }

      .button-group .btn {
        flex: 1;
        min-width: 0;
      }

      .btn {
        font-size: 12px;
        padding: 8px 10px;
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="app-frame">
      <!-- PC用 左右デコ（スマホでは display:none） -->
      <div class="side-deco"></div>

      <!-- 中央ゲームカード -->
      <main class="game-card">
        <!-- 上部ヘッダー帯：スコア / レベル / ライン（モバイル仕様） -->
        <div class="mobile-header">
          <div class="header-stat">
            <span class="label">スコア</span>
            <span class="value" id="score">0</span>
          </div>
          <div class="header-stat">
            <span class="label">レベル</span>
            <span class="value" id="level">1</span>
          </div>
          <div class="header-stat">
            <span class="label">ライン</span>
            <span class="value" id="lines">0</span>
          </div>
        </div>

        <div class="game-container">
          <!-- 左カラム：実プレイ盤面 -->
          <section class="board-wrapper">
            <!-- JS側で width/height を設定していても OK。CSS でリサイズ。 -->
            <canvas id="board"></canvas>
            <!-- ポーズ時ブラックアウト + 終了ボタン（モバイル仕様） -->
            <div class="pause-overlay" id="pauseOverlay" aria-hidden="true">
              <button type="button" class="btn end-btn" id="endBtn">ゲームを終了する</button>
            </div>
          </section>

          <!-- 右カラム：HUD（ネクスト + スタート/ポーズ） -->
          <aside class="hud-column">
            <!-- ネクスト -->
            <div class="next-widget">
              <h3>ネクスト</h3>
              <canvas id="next" width="160" height="160"></canvas>
            </div>

            <!-- 操作ボタン（単一：スタート→ポーズ/再開に切替） -->
            <div class="button-group hud-controls">
              <button type="button" class="btn" id="startBtn">スタート</button>
              <button type="button" class="btn" id="pauseBtn" style="display:none">ポーズ</button>
            </div>
          </aside>
        </div>
      </main>

      <div class="side-deco"></div>
    </div>
  </div>

  <!-- ゲームロジック JavaScript -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const boardCanvas = document.getElementById('board');
      const nextCanvas  = document.getElementById('next');
      const scoreEl     = document.getElementById('score');
      const levelEl     = document.getElementById('level');
      const linesEl     = document.getElementById('lines');
      const startBtn    = document.getElementById('startBtn');
      const pauseBtn    = document.getElementById('pauseBtn');
      const pauseOverlay = document.getElementById('pauseOverlay');
      const endBtn = document.getElementById('endBtn');

      if (!boardCanvas || !nextCanvas || !scoreEl || !levelEl || !linesEl || !startBtn || !pauseBtn || !pauseOverlay || !endBtn) {
        console.error('必要な要素が見つかりません');
        return;
      }

      const COLS = 10;
      const ROWS = 20;
      const BLOCK_SIZE = 24;      // 内部解像度（CSSで拡大表示）
      const NEXT_SIZE  = 20;

      // キャンバス内部サイズ（表示サイズとは独立）
      boardCanvas.width  = COLS * BLOCK_SIZE;
      boardCanvas.height = ROWS * BLOCK_SIZE;
      nextCanvas.width   = 5 * NEXT_SIZE;
      nextCanvas.height  = 5 * NEXT_SIZE;

      const ctx  = boardCanvas.getContext('2d');
      const nctx = nextCanvas.getContext('2d');

      // テトロミノ定義
      const SHAPES = {
        I: [[1, 1, 1, 1]],
        O: [
          [1, 1],
          [1, 1]
        ],
        T: [
          [0, 1, 0],
          [1, 1, 1]
        ],
        S: [
          [0, 1, 1],
          [1, 1, 0]
        ],
        Z: [
          [1, 1, 0],
          [0, 1, 1]
        ],
        J: [
          [1, 0, 0],
          [1, 1, 1]
        ],
        L: [
          [0, 0, 1],
          [1, 1, 1]
        ]
      };

      const COLORS = {
        I: '#00e5ff',
        O: '#ffeb3b',
        T: '#ce93d8',
        S: '#69f0ae',
        Z: '#ff5252',
        J: '#448aff',
        L: '#ffab40'
      };

      // 状態
      let board;
      let current;
      let nextPiece;
      let score;
      let level;
      let lines;
      let dropInterval;
      let lastDropTime;
      let animationId;
      let paused = false;
      let gameOver = false;
      let started = false;

      function createEmptyBoard() {
        return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
      }

      function randomPieceType() {
        const keys = Object.keys(SHAPES);
        return keys[Math.floor(Math.random() * keys.length)];
      }

      function createPiece(type) {
        const shape = SHAPES[type];
        return {
          type,
          shape: shape.map(row => [...row]),
          x: Math.floor((COLS - shape[0].length) / 2),
          y: 0
        };
      }

      function rotate(shape) {
        const rows = shape.length;
        const cols = shape[0].length;
        const result = [];
        for (let x = 0; x < cols; x++) {
          const row = [];
          for (let y = rows - 1; y >= 0; y--) {
            row.push(shape[y][x]);
          }
          result.push(row);
        }
        return result;
      }

      function collide(b, piece) {
        const { shape, x: px, y: py } = piece;
        for (let y = 0; y < shape.length; y++) {
          for (let x = 0; x < shape[y].length; x++) {
            if (!shape[y][x]) continue;
            const bx = px + x;
            const by = py + y;
            if (bx < 0 || bx >= COLS || by >= ROWS) return true;
            if (by >= 0 && b[by][bx]) return true;
          }
        }
        return false;
      }

      function merge(b, piece) {
        const { shape, x: px, y: py, type } = piece;
        for (let y = 0; y < shape.length; y++) {
          for (let x = 0; x < shape[y].length; x++) {
            if (!shape[y][x]) continue;
            const bx = px + x;
            const by = py + y;
            if (by >= 0 && by < ROWS && bx >= 0 && bx < COLS) {
              b[by][bx] = type;
            }
          }
        }
      }

      function clearLines() {
        let cleared = 0;
        for (let y = ROWS - 1; y >= 0; y--) {
          if (board[y].every(c => c)) {
            board.splice(y, 1);
            board.unshift(Array(COLS).fill(null));
            cleared++;
            y++;
          }
        }
        if (cleared > 0) {
          lines += cleared;
          score += [0, 100, 300, 500, 800][cleared] * level;
          level = Math.floor(lines / 10) + 1;
          dropInterval = Math.max(120, 1000 - (level - 1) * 80);
          updateUI();
        }
      }

      function drawCell(x, y, type) {
        const color = COLORS[type] || '#777';
        const px = x * BLOCK_SIZE;
        const py = y * BLOCK_SIZE;

        const grad = ctx.createLinearGradient(px, py, px + BLOCK_SIZE, py + BLOCK_SIZE);
        grad.addColorStop(0, color);
        grad.addColorStop(1, '#ffffff');

        ctx.save();
        ctx.fillStyle = '#000000';
        ctx.fillRect(px, py, BLOCK_SIZE, BLOCK_SIZE);
        ctx.fillStyle = grad;
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 2;
        const r = 6;
        ctx.beginPath();
        ctx.roundRect(px + 1, py + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2, r);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawBoard() {
        ctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
        for (let y = 0; y < ROWS; y++) {
          for (let x = 0; x < COLS; x++) {
            const type = board[y][x];
            if (type) drawCell(x, y, type);
          }
        }
        const { shape, x: px, y: py, type } = current;
        for (let y = 0; y < shape.length; y++) {
          for (let x = 0; x < shape[y].length; x++) {
            if (!shape[y][x]) continue;
            const bx = px + x;
            const by = py + y;
            if (by >= 0) drawCell(bx, by, type);
          }
        }
      }

      function drawNext() {
        nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
        if (!nextPiece) return;
        const shape = nextPiece.shape;
        const size  = NEXT_SIZE;
        const w = shape[0].length;
        const h = shape.length;
        const offsetX = Math.floor((nextCanvas.width  / size - w) / 2);
        const offsetY = Math.floor((nextCanvas.height / size - h) / 2);

        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            if (!shape[y][x]) continue;
            const px = (offsetX + x) * size;
            const py = (offsetY + y) * size;
            const color = COLORS[nextPiece.type];

            const grad = nctx.createLinearGradient(px, py, px + size, py + size);
            grad.addColorStop(0, color);
            grad.addColorStop(1, '#ffffff');
            nctx.save();
            nctx.fillStyle = grad;
            nctx.strokeStyle = 'rgba(255,255,255,0.7)';
            nctx.lineWidth = 1.5;
            nctx.beginPath();
            nctx.roundRect(px + 1, py + 1, size - 2, size - 2, 5);
            nctx.fill();
            nctx.stroke();
            nctx.restore();
          }
        }
      }

      function updateUI() {
        scoreEl.textContent = String(score);
        levelEl.textContent = String(level);
        linesEl.textContent = String(lines);
      }

      function spawnPiece() {
        if (!nextPiece) {
          nextPiece = createPiece(randomPieceType());
        }
        current   = nextPiece;
        nextPiece = createPiece(randomPieceType());
        if (collide(board, current)) {
          gameOver = true;
          cancelAnimationFrame(animationId);
          alert('ゲームオーバー');
        }
        drawNext();
      }

      function hardDrop() {
        while (!collide(board, { ...current, y: current.y + 1 })) {
          current.y++;
        }
        lockPiece();
      }

      function lockPiece() {
        merge(board, current);
        clearLines();
        spawnPiece();
      }

      function startGame() {
        board = createEmptyBoard();
        score = 0;
        level = 1;
        lines = 0;
        dropInterval = 1000;
        lastDropTime = performance.now();
        paused = false;
        gameOver = false;
        nextPiece = null;
        spawnPiece();
        updateUI();
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(loop);
        started = true;
        startBtn.textContent = 'ポーズ';
        pauseOverlay.classList.remove('is-active');
        pauseOverlay.setAttribute('aria-hidden', 'true');
      }

      function togglePause() {
        if (!started || gameOver) return;
        paused = !paused;
        startBtn.textContent = paused ? '再開' : 'ポーズ';
        if (paused) {
          pauseOverlay.classList.add('is-active');
          pauseOverlay.setAttribute('aria-hidden', 'false');
          return;
        } else {
          pauseOverlay.classList.remove('is-active');
          pauseOverlay.setAttribute('aria-hidden', 'true');
          lastDropTime = performance.now();
          animationId = requestAnimationFrame(loop);
        }
      }

      function loop(timestamp) {
        if (paused || gameOver) return;
        const delta = timestamp - lastDropTime;
        if (delta >= dropInterval) {
          lastDropTime = timestamp;
          const moved = { ...current, y: current.y + 1 };
          if (!collide(board, moved)) {
            current.y++;
          } else {
            lockPiece();
          }
        }
        drawBoard();
        animationId = requestAnimationFrame(loop);
      }

      // キー操作
      document.addEventListener('keydown', (e) => {
        if (!current || paused || gameOver) return;
        let moved;
        switch (e.key) {
          case 'ArrowLeft':
            moved = { ...current, x: current.x - 1 };
            if (!collide(board, moved)) current.x--;
            break;
          case 'ArrowRight':
            moved = { ...current, x: current.x + 1 };
            if (!collide(board, moved)) current.x++;
            break;
          case 'ArrowDown':
            moved = { ...current, y: current.y + 1 };
            if (!collide(board, moved)) {
              current.y++;
            } else {
              lockPiece();
            }
            break;
          case 'ArrowUp':
          case 'x':
          case 'X': {
            const rotatedShape = rotate(current.shape);
            moved = { ...current, shape: rotatedShape };
            if (!collide(board, moved)) current.shape = rotatedShape;
            break;
          }
          case ' ':
            hardDrop();
            break;
        }
        drawBoard();
      });

      // ボタンイベント（スタート前: startGame / 開始後: togglePause）
      startBtn.addEventListener('click', () => {
        if (!started) startGame();
        else togglePause();
      });
      // pauseBtn はDOM上の互換IDとして残すが、表示はしない
      pauseBtn.addEventListener('click', togglePause);

      // スマホ時：canvas#board の見た目サイズを、内部解像度に対して等倍スケールで拡大
      // ※ 下部パネル open / closed によって board のサイズは変えない（常に同じスケール）
      function layoutMobileBoard() {
        const isMobile = window.innerWidth <= 768;
        const baseW = boardCanvas.width;   // 240
        const baseH = boardCanvas.height;  // 480
        if (!isMobile) {
          boardCanvas.style.width  = '';
          boardCanvas.style.height = '';
          return;
        }

        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const wrapper = document.querySelector('.board-wrapper');
        const hudColumn = document.querySelector('.hud-column');

        // HUD カラムの幅を引いた残りを盤面の利用可能幅とする
        const hudWidth = hudColumn ? (hudColumn.offsetWidth || 92) : 92;
        const horizontalGap = 8;
        const availableWidth = Math.max(120, vw * 0.98 - hudWidth - horizontalGap);

        // ステータスバー分として常に一定の高さだけ確保（open / closed に依存させない）
        const fixedBarHeight = Math.max(56, vh * 0.2);
        const reservedTop = 56; // NEXT ウィジェット＋上部余白
        const verticalMargin = 12;
        const availableHeight = Math.max(
          120,
          vh - reservedTop - fixedBarHeight - verticalMargin
        );

        // 縦横比を保ったまま最大化するための等倍スケール
        const scale = Math.min(
          availableWidth / baseW,
          availableHeight / baseH,
          2.5
        );

        const displayW = Math.floor(baseW * scale);
        const displayH = Math.floor(baseH * scale);

        boardCanvas.style.width  = displayW + 'px';
        boardCanvas.style.height = displayH + 'px';

        if (wrapper) {
          wrapper.style.width  = displayW + 'px';
          wrapper.style.height = displayH + 'px';
        }
      }

      // 終了ボタン（ポーズ中のブラックアウト上）
      endBtn.addEventListener('click', () => {
        if (animationId) cancelAnimationFrame(animationId);
        started = false;
        paused = false;
        gameOver = false;

        board = createEmptyBoard();
        current = null;
        nextPiece = null;
        score = 0;
        level = 1;
        lines = 0;
        updateUI();

        ctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
        nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
        drawBoard();

        pauseOverlay.classList.remove('is-active');
        pauseOverlay.setAttribute('aria-hidden', 'true');
        startBtn.textContent = 'スタート';
      });

      // 初期状態（開始前）
      board = createEmptyBoard();
      score = 0;
      level = 1;
      lines = 0;
      started = false;
      paused = false;
      gameOver = false;
      startBtn.textContent = 'スタート';
      pauseOverlay.classList.remove('is-active');
      pauseOverlay.setAttribute('aria-hidden', 'true');
      drawBoard();
      drawNext();
      updateUI();

      layoutMobileBoard();
      window.addEventListener('resize', layoutMobileBoard);
      setTimeout(layoutMobileBoard, 150);
    });
  </script>
</body>
</html>
