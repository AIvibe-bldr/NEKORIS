<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホ対応 viewport（ゲーム用：ピンチ・ダブルタップ等のズームを抑止しやすくする） -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>テトリス</title>

  <style>
    /* ===== リセット ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Meiryo", sans-serif;
      background:
        radial-gradient(circle at top, #1d2755 0, #050818 55%, #02030a 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;        /* 横スクロール禁止 */
    }

    /* ===== 共通レイアウト（PC 基準）===== */

    .app-shell {
      width: 100%;
      max-width: 1200px;
      padding: 24px;
    }

    /* PC では「左右デコ + 中央ゲーム」構成 */
    .app-frame {
      display: grid;
      grid-template-columns: 1fr minmax(0, 920px) 1fr;
      gap: 24px;
      align-items: stretch;
    }

    /* 左右ネオン背景パネル（PC用） */
    .side-deco {
      border-radius: 24px;
      background: radial-gradient(circle at center, rgba(0,255,255,0.16), transparent 70%);
      opacity: 0.7;
    }

    /* 中央ゲームカード */
    .game-card {
      border-radius: 24px;
      padding: 24px 28px;
      background:
        radial-gradient(circle at top left, rgba(0,255,255,0.12), transparent 60%),
        radial-gradient(circle at bottom right, rgba(123,47,247,0.18), transparent 65%),
        rgba(10, 13, 32, 0.95);
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(0, 255, 255, 0.25);
    }

    /* ゲームコンテナ（PC：ボード + サイドパネル 2カラム） */
    .game-container {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ===== ゲーム盤面 ===== */
    .board-wrapper {
      position: relative; /* 盤面内オーバーレイの基準 */
      flex: 0 0 360px;
      max-width: 360px;
      border-radius: 18px;
      padding: 8px;
      background: rgba(3, 8, 24, 0.95);
      box-shadow:
        0 0 32px rgba(0, 255, 255, 0.25),
        inset 0 0 20px rgba(0, 0, 0, 0.7);
      /* iOS Safari のダブルタップズーム抑止の補助（子の canvas と併用） */
      touch-action: manipulation;
    }

    /* ポーズ（盤面内のみ。gameover-overlay とは別要素・z-index も下） */
    .pause-overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(0, 0, 0, 0.88);
      border-radius: 14px;
      z-index: 5;
      padding: 14px 12px;
      text-align: center;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .pause-overlay.is-active {
      display: flex;
    }

    .pause-overlay-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      max-width: 280px;
    }

    .pause-title {
      margin: 0;
      font-size: clamp(1.15rem, 4vw, 1.5rem);
      font-weight: 800;
      letter-spacing: 0.12em;
      color: #7ee8ff;
      text-shadow: 0 0 14px rgba(0, 230, 255, 0.45);
    }

    .pause-help {
      margin: 0;
      padding: 0 4px;
      list-style: none;
      font-size: clamp(0.8rem, 3.2vw, 0.95rem);
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.92);
      text-align: center;
    }

    .pause-help li {
      padding: 2px 0;
    }

    .pause-help-note {
      margin: 4px 0 0;
      font-size: clamp(0.72rem, 2.8vw, 0.82rem);
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.55);
    }

    .pause-overlay .end-btn {
      margin-top: 6px;
      flex-shrink: 0;
      width: min(260px, 100%);
      padding: 10px 14px;
      border-radius: 10px;
      background: linear-gradient(135deg, #ff5252, #7b2ff7);
    }

    /* ゲームオーバー（canvas#board 領域のみ覆う） */
    .gameover-overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 14px;
      z-index: 15;
      padding: 16px;
      text-align: center;
    }

    .gameover-overlay.is-active {
      display: flex;
    }

    .gameover-title {
      margin: 0;
      font-size: clamp(1.1rem, 4vw, 1.75rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #ff6b6b;
      text-shadow: 0 0 12px rgba(255, 80, 80, 0.6);
    }

    .gameover-overlay .gameover-buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
    }

    /* 盤面キャンバス（内部ロジック上は 10x20 想定） */
    canvas#board {
      display: block;
      width: 100%;
      height: 100%;
      aspect-ratio: 1 / 2; /* 見た目比率のみ固定 */
      background: radial-gradient(circle at top, #050816 0, #000 60%);
      border-radius: 14px;
      box-shadow: 0 0 18px rgba(0, 255, 255, 0.4);
      /* manipulation: ダブルタップズーム無効化。スワイプ時は touchmove で preventDefault しスクロールを抑止 */
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ===== 右側情報パネル（PC）===== */
    .side-panel {
      flex: 0 0 220px;
      max-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel-box {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(8, 12, 30, 0.95);
      box-shadow:
        0 0 16px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(0, 255, 255, 0.12);
    }

    .panel-box h3 {
      font-size: 12px;
      margin-bottom: 6px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .panel-box .value {
      font-size: 28px;
      font-weight: 700;
      color: #00e5ff;
      text-shadow: 0 0 8px rgba(0, 255, 255, 0.7);
    }

    canvas#next {
      display: block;
      margin: 4px auto 0;
      width: 160px;
      height: 160px;
      background: #050815;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.9);
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      color: #fff;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      background: linear-gradient(135deg, #00bcd4, #7b2ff7);
      box-shadow: 0 0 16px rgba(0, 188, 212, 0.6);
      white-space: nowrap;   /* ボタン文字が切れないようにする */
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 0 10px rgba(0, 188, 212, 0.4);
    }

    /* ゲームオーバー共通ボタン（レイアウト・タイポ）＋種別で背景のみ分岐 */
    .gameover-overlay .gameover-btn {
      width: 80%;
      max-width: 320px;
      padding: 16px 0;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      color: white;
      border: none;
      display: block;
      margin: 12px auto;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: all 0.15s ease;
      /* 通常状態 */
      transform: scale(1);
      box-shadow: 0 0 20px rgba(123, 47, 247, 0.4);
    }

    .gameover-overlay .restart-btn {
      background: linear-gradient(135deg, #00c6ff, #7b2ff7);
    }

    .gameover-overlay .exit-btn {
      background: linear-gradient(135deg, #ff4b2b, #ff416c);
    }

    /* 押した瞬間 */
    .gameover-overlay .gameover-btn:active {
      transform: scale(0.95);
      box-shadow: 0 0 8px rgba(123, 47, 247, 0.2);
    }

    /* ===== スマホレイアウト（1カラム縦並び） ===== */
    @media (max-width: 768px) {
      body {
        align-items: flex-start;
        padding: 16px 0;
      }

      .app-shell {
        padding: 12px 8px 24px;
      }

      /* 装飾パネルは非表示（ゲーム盤面優先） */
      .side-deco {
        display: none;
      }

      .app-frame {
        display: block;
      }

      .game-card {
        padding: 12px 10px 16px;
        border-radius: 0;
        box-shadow: none;
        background:
          radial-gradient(circle at top, rgba(0,255,255,0.2), transparent 55%),
          rgba(5, 8, 24, 0.97);
      }

      /* 1,2,5. スマホでは 1 カラム縦並び & 固定幅撤廃 */
      .game-container {
        flex-direction: column;
        align-items: center;
        gap: 16px;
        width: 100%;
        max-width: none;
      }

      /* 6. board-wrapper は width: min(92vw, 420px)、aspect-ratio: 1 / 2 */
      .board-wrapper {
        width: min(92vw, 420px);
        max-width: 420px;
        padding: 6px;
      }

      /* 7. canvas#board は width:100%, height:100%（aspect-ratioに従う） */
      canvas#board {
        width: 100%;
        height: 100%;
        aspect-ratio: 1 / 2;
      }

      /* 3,8. 盤面の下に：スコア/レベル/ライン → ネクスト → ボタン */
      .side-panel {
        width: 100%;
        max-width: 420px;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .panel-box {
        width: 100%;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .stat-grid .panel-box {
        width: 100%;
      }

      canvas#next {
        width: 100%;
        height: auto;
        max-height: 220px;
      }

      .btn {
        font-size: 14px;
        padding-block: 10px;
      }

      /* 仕様変更: 下部バー廃止 */
      .side-panel {
        display: none !important;
      }

      .mobile-header {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        margin-bottom: 8px;
      }

      .mobile-header .header-stat {
        background: rgba(8, 12, 30, 0.9);
        border-radius: 8px;
        padding: 4px 6px;
        text-align: center;
      }

      .mobile-header .label {
        display: block;
        font-size: 9px;
        opacity: 0.7;
      }

      .mobile-header .value {
        display: block;
        font-size: 14px;
        font-weight: 800;
        color: #00e5ff;
      }

      .game-container {
        flex-direction: row;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 8px;
      }

      .board-wrapper {
        position: relative;
        flex: 1 1 auto;
        min-width: 0;
      }

      .board-wrapper canvas#board {
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 2;
        touch-action: none;
      }

      .hud-column {
        flex: 0 0 96px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .next-widget {
        background: rgba(8, 12, 30, 0.9);
        border-radius: 8px;
        padding: 4px;
        text-align: center;
      }

      .next-widget h3 {
        font-size: 9px;
        margin-bottom: 2px;
      }

      .next-widget canvas#next {
        width: 64px;
        height: 64px;
        margin: 0 auto;
      }

      .hud-controls {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .hud-controls .btn {
        width: 100%;
        font-size: 12px;
        padding: 8px 6px;
        border-radius: 9px;
      }

      .pause-overlay {
        inset: 6px;
        border-radius: 12px;
      }

      .end-btn {
        width: min(220px, calc(100% - 20px));
        padding: 10px 12px;
        border-radius: 10px;
        background: linear-gradient(135deg, #ff5252, #7b2ff7);
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="app-frame">
      <!-- PC用 左右デコ（スマホでは display:none） -->
      <div class="side-deco"></div>

      <!-- 中央ゲームカード -->
      <main class="game-card">
        <!-- 上部ヘッダー帯 -->
        <div class="mobile-header">
          <div class="header-stat">
            <span class="label">スコア</span>
            <span class="value" id="score">0</span>
          </div>
          <div class="header-stat">
            <span class="label">レベル</span>
            <span class="value" id="level">1</span>
          </div>
          <div class="header-stat">
            <span class="label">ライン</span>
            <span class="value" id="lines">0</span>
          </div>
        </div>

        <div class="game-container">
          <!-- 左：盤面 -->
          <section class="board-wrapper">
            <canvas id="board"></canvas>
            <div class="pause-overlay" id="pauseOverlay" aria-hidden="true">
              <div class="pause-overlay-inner">
                <h2 class="pause-title">一時停止</h2>
                <ul class="pause-help" aria-label="モバイル操作">
                  <li>タップ：回転</li>
                  <li>左ドラッグ：左移動</li>
                  <li>右ドラッグ：右移動</li>
                  <li>下スワイプ：ハードドロップ</li>
                </ul>
                <p class="pause-help-note">キーボードの矢印・スペースでも操作できます。</p>
                <button type="button" class="btn end-btn" id="endBtn">ゲームを終了する</button>
              </div>
            </div>
            <div class="gameover-overlay" id="gameoverOverlay" aria-hidden="true">
              <h2 class="gameover-title">ゲームオーバー</h2>
              <div class="gameover-buttons">
                <button type="button" class="gameover-btn restart-btn" id="gameoverRestartBtn">最初から</button>
                <button type="button" class="gameover-btn exit-btn" id="gameoverExitBtn">ゲームを終了する</button>
              </div>
            </div>
          </section>

          <!-- 右：HUD（next + start/pause） -->
          <aside class="hud-column">
            <div class="next-widget">
              <h3>ネクスト</h3>
              <canvas id="next" width="160" height="160"></canvas>
            </div>
            <div class="hud-controls">
              <button type="button" class="btn" id="startBtn">スタート</button>
              <button type="button" class="btn" id="pauseBtn" style="display:none">ポーズ</button>
            </div>
          </aside>
        </div>
      </main>

      <div class="side-deco"></div>
    </div>
  </div>

  <!-- ゲームロジック JavaScript -->
  <script>
    // DOM構築完了後に初期化
    window.addEventListener('DOMContentLoaded', () => {
      const boardCanvas = document.getElementById('board');
      const nextCanvas  = document.getElementById('next');
      const scoreEl     = document.getElementById('score');
      const levelEl     = document.getElementById('level');
      const linesEl     = document.getElementById('lines');
      const startBtn    = document.getElementById('startBtn');
      const pauseBtn    = document.getElementById('pauseBtn');
      const pauseOverlay = document.getElementById('pauseOverlay');
      const endBtn = document.getElementById('endBtn');
      const gameoverOverlay = document.getElementById('gameoverOverlay');
      const gameoverRestartBtn = document.getElementById('gameoverRestartBtn');
      const gameoverExitBtn = document.getElementById('gameoverExitBtn');

      if (!boardCanvas || !nextCanvas || !scoreEl || !levelEl || !linesEl || !startBtn || !pauseBtn || !pauseOverlay || !endBtn || !gameoverOverlay || !gameoverRestartBtn || !gameoverExitBtn) {
        console.error('必要な要素が見つかりません');
        return;
      }

      const COLS = 10;
      const ROWS = 20;
      const BLOCK_SIZE = 24;      // 内部解像度（CSSで拡大表示）
      const NEXT_SIZE  = 20;

      // キャンバス内部サイズ（表示サイズとは独立）
      boardCanvas.width  = COLS * BLOCK_SIZE;
      boardCanvas.height = ROWS * BLOCK_SIZE;
      nextCanvas.width   = 5 * NEXT_SIZE;
      nextCanvas.height  = 5 * NEXT_SIZE;

      const ctx  = boardCanvas.getContext('2d');
      const nctx = nextCanvas.getContext('2d');

      // テトロミノ定義
      const SHAPES = {
        I: [[1, 1, 1, 1]],
        O: [
          [1, 1],
          [1, 1]
        ],
        T: [
          [0, 1, 0],
          [1, 1, 1]
        ],
        S: [
          [0, 1, 1],
          [1, 1, 0]
        ],
        Z: [
          [1, 1, 0],
          [0, 1, 1]
        ],
        J: [
          [1, 0, 0],
          [1, 1, 1]
        ],
        L: [
          [0, 0, 1],
          [1, 1, 1]
        ]
      };

      const COLORS = {
        I: '#00e5ff',
        O: '#ffeb3b',
        T: '#ce93d8',
        S: '#69f0ae',
        Z: '#ff5252',
        J: '#448aff',
        L: '#ffab40'
      };

      // 状態
      let board;
      let current;
      let nextPiece;
      let score;
      let level;
      let lines;
      let dropInterval;
      let lastDropTime;
      let animationId;
      let paused = false;
      let gameOver = false;
      let started = false;

      function createEmptyBoard() {
        return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
      }

      function randomPieceType() {
        const keys = Object.keys(SHAPES);
        return keys[Math.floor(Math.random() * keys.length)];
      }

      function createPiece(type) {
        const shape = SHAPES[type];
        return {
          type,
          shape: shape.map(row => [...row]),
          x: Math.floor((COLS - shape[0].length) / 2),
          y: 0
        };
      }

      function rotate(shape) {
        const rows = shape.length;
        const cols = shape[0].length;
        const result = [];
        for (let x = 0; x < cols; x++) {
          const row = [];
          for (let y = rows - 1; y >= 0; y--) {
            row.push(shape[y][x]);
          }
          result.push(row);
        }
        return result;
      }

      // ウォールキック：回転後に試す x 方向オフセット（順に優先）
      const ROTATION_KICK_OFFSETS = [0, -1, 1, -2, 2];

      /**
       * 時計回り回転を試し、衝突時は位置補正して再試行する。
       * @returns {boolean} いずれかの位置で回転できたら true
       */
      function tryRotateWithWallKick() {
        if (!current) return false;
        const rotatedShape = rotate(current.shape);
        const baseX = current.x;
        const baseY = current.y;

        for (const dx of ROTATION_KICK_OFFSETS) {
          const candidate = {
            ...current,
            x: baseX + dx,
            y: baseY,
            shape: rotatedShape,
          };
          if (!collide(board, candidate)) {
            current.x = baseX + dx;
            current.shape = rotatedShape;
            return true;
          }
        }
        return false;
      }

      function collide(b, piece) {
        const { shape, x: px, y: py } = piece;
        for (let y = 0; y < shape.length; y++) {
          for (let x = 0; x < shape[y].length; x++) {
            if (!shape[y][x]) continue;
            const bx = px + x;
            const by = py + y;
            if (bx < 0 || bx >= COLS || by >= ROWS) return true;
            if (by >= 0 && b[by][bx]) return true;
          }
        }
        return false;
      }

      function merge(b, piece) {
        const { shape, x: px, y: py, type } = piece;
        for (let y = 0; y < shape.length; y++) {
          for (let x = 0; x < shape[y].length; x++) {
            if (!shape[y][x]) continue;
            const bx = px + x;
            const by = py + y;
            if (by >= 0 && by < ROWS && bx >= 0 && bx < COLS) {
              b[by][bx] = type;
            }
          }
        }
      }

      function clearLines() {
        let cleared = 0;
        for (let y = ROWS - 1; y >= 0; y--) {
          if (board[y].every(c => c)) {
            board.splice(y, 1);
            board.unshift(Array(COLS).fill(null));
            cleared++;
            y++;
          }
        }
        if (cleared > 0) {
          lines += cleared;
          // 1〜3行は従来どおり（レベル倍率）、4行同時（テトリス）のみ 1000 点固定
          if (cleared === 4) {
            score += 1000;
          } else {
            score += [0, 100, 300, 500, 800][cleared] * level;
          }
          level = Math.floor(lines / 10) + 1;
          dropInterval = Math.max(120, 1000 - (level - 1) * 80);
          updateUI();
        }
      }

      function drawCell(x, y, type) {
        const color = COLORS[type] || '#777';
        const px = x * BLOCK_SIZE;
        const py = y * BLOCK_SIZE;

        const grad = ctx.createLinearGradient(px, py, px + BLOCK_SIZE, py + BLOCK_SIZE);
        grad.addColorStop(0, color);
        grad.addColorStop(1, '#ffffff');

        ctx.save();
        ctx.fillStyle = '#000000';
        ctx.fillRect(px, py, BLOCK_SIZE, BLOCK_SIZE);
        ctx.fillStyle = grad;
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 2;
        const r = 6;
        ctx.beginPath();
        ctx.roundRect(px + 1, py + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2, r);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawBoard() {
        ctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
        for (let y = 0; y < ROWS; y++) {
          for (let x = 0; x < COLS; x++) {
            const type = board[y][x];
            if (type) drawCell(x, y, type);
          }
        }
        if (!current) return;
        const { shape, x: px, y: py, type } = current;
        for (let y = 0; y < shape.length; y++) {
          for (let x = 0; x < shape[y].length; x++) {
            if (!shape[y][x]) continue;
            const bx = px + x;
            const by = py + y;
            if (by >= 0) drawCell(bx, by, type);
          }
        }
      }

      function drawNext() {
        nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
        if (!nextPiece) return;
        const shape = nextPiece.shape;
        const size  = NEXT_SIZE;
        const w = shape[0].length;
        const h = shape.length;
        const offsetX = Math.floor((nextCanvas.width  / size - w) / 2);
        const offsetY = Math.floor((nextCanvas.height / size - h) / 2);

        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            if (!shape[y][x]) continue;
            const px = (offsetX + x) * size;
            const py = (offsetY + y) * size;
            const color = COLORS[nextPiece.type];

            const grad = nctx.createLinearGradient(px, py, px + size, py + size);
            grad.addColorStop(0, color);
            grad.addColorStop(1, '#ffffff');
            nctx.save();
            nctx.fillStyle = grad;
            nctx.strokeStyle = 'rgba(255,255,255,0.7)';
            nctx.lineWidth = 1.5;
            nctx.beginPath();
            nctx.roundRect(px + 1, py + 1, size - 2, size - 2, 5);
            nctx.fill();
            nctx.stroke();
            nctx.restore();
          }
        }
      }

      function updateUI() {
        scoreEl.textContent = String(score);
        levelEl.textContent = String(level);
        linesEl.textContent = String(lines);
      }

      function spawnPiece() {
        if (!nextPiece) {
          nextPiece = createPiece(randomPieceType());
        }
        current   = nextPiece;
        nextPiece = createPiece(randomPieceType());
        if (collide(board, current)) {
          gameOver = true;
          showGameOverOverlay();
        }
        drawNext();
      }

      function hardDrop() {
        while (!collide(board, { ...current, y: current.y + 1 })) {
          current.y++;
        }
        // ハードドロップ 1 回につき固定 10 点（落下距離は関係しない）
        score += 10;
        updateUI();
        lockPiece();
      }

      function lockPiece() {
        merge(board, current);
        clearLines();
        spawnPiece();
      }

      function showGameOverOverlay() {
        // ゲームオーバーとポーズ用オーバーレイを混在させない
        pauseOverlay.classList.remove('is-active');
        pauseOverlay.setAttribute('aria-hidden', 'true');
        paused = false;
        startBtn.textContent = 'ポーズ';
        gameoverOverlay.classList.add('is-active');
        gameoverOverlay.setAttribute('aria-hidden', 'false');
      }

      function hideGameOverOverlay() {
        gameoverOverlay.classList.remove('is-active');
        gameoverOverlay.setAttribute('aria-hidden', 'true');
      }

      /** サイト初回表示と同じ「初期画面」へ（リロードなし） */
      function resetToInitialScreen() {
        if (animationId) cancelAnimationFrame(animationId);
        animationId = null;
        started = false;
        paused = false;
        gameOver = false;
        board = createEmptyBoard();
        current = null;
        nextPiece = null;
        score = 0;
        level = 1;
        lines = 0;
        dropInterval = 1000;
        updateUI();
        nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
        drawBoard();
        drawNext();
        pauseOverlay.classList.remove('is-active');
        pauseOverlay.setAttribute('aria-hidden', 'true');
        hideGameOverOverlay();
        startBtn.textContent = 'スタート';
      }

      function startGame() {
        hideGameOverOverlay();
        board = createEmptyBoard();
        score = 0;
        level = 1;
        lines = 0;
        dropInterval = 1000;
        lastDropTime = performance.now();
        paused = false;
        gameOver = false;
        nextPiece = null;
        spawnPiece();
        updateUI();
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(loop);
        started = true;
        paused = false;
        startBtn.textContent = 'ポーズ';
        pauseOverlay.classList.remove('is-active');
        pauseOverlay.setAttribute('aria-hidden', 'true');
      }

      function togglePause() {
        if (!started || gameOver) return;
        paused = !paused;
        startBtn.textContent = paused ? '再開' : 'ポーズ';
        if (paused) {
          pauseOverlay.classList.add('is-active');
          pauseOverlay.setAttribute('aria-hidden', 'false');
          return;
        }
        pauseOverlay.classList.remove('is-active');
        pauseOverlay.setAttribute('aria-hidden', 'true');
        if (!paused) {
          lastDropTime = performance.now();
          animationId = requestAnimationFrame(loop);
        }
      }

      function loop(timestamp) {
        if (paused || gameOver) return;
        const delta = timestamp - lastDropTime;
        if (delta >= dropInterval) {
          lastDropTime = timestamp;
          const moved = { ...current, y: current.y + 1 };
          if (!collide(board, moved)) {
            current.y++;
          } else {
            lockPiece();
          }
        }
        drawBoard();
        // lockPiece → spawn で gameOver になったフレームではループを再登録しない（完全停止）
        if (!paused && !gameOver) {
          animationId = requestAnimationFrame(loop);
        }
      }

      // キー操作
      document.addEventListener('keydown', (e) => {
        if (!current || paused || gameOver) return;
        let moved;
        switch (e.key) {
          case 'ArrowLeft':
            moved = { ...current, x: current.x - 1 };
            if (!collide(board, moved)) current.x--;
            break;
          case 'ArrowRight':
            moved = { ...current, x: current.x + 1 };
            if (!collide(board, moved)) current.x++;
            break;
          case 'ArrowDown':
            moved = { ...current, y: current.y + 1 };
            if (!collide(board, moved)) {
              current.y++;
            } else {
              lockPiece();
            }
            break;
          case 'ArrowUp':
          case 'x':
          case 'X':
            tryRotateWithWallKick();
            break;
          case ' ':
            hardDrop();
            break;
        }
        drawBoard();
      });

      // モバイル用タッチ操作（canvas#board のみ）
      const TOUCH_TAP_MAX = 12;           // タップ（回転）: 開始位置からの移動がこれ未満
      const TOUCH_STEP_X = 22;            // 横ドラッグ: この px ごとに 1 マス（基準点を更新して連続移動）
      const TOUCH_DOWN_MIN_DIST = 40;     // 下フリック: この px 以上下に動いた
      const TOUCH_DOWN_MAX_DURATION = 320; // 下フリック: 指を離すまでの時間がこれ以下（素早い操作）
      const TOUCH_DOWN_MIN_VELOCITY = 0.35; // px/ms、下方向の最低速度

      let touchTrackingId = null;
      let touchStartX = 0;
      let touchStartY = 0;
      let touchStartTime = 0;
      let touchAnchorX = 0; // 横 1 マスごとの累積基準（クライアント X）
      let touchDidHorizontalStep = false; // このジェスチャーで左右に 1 マス以上動かしたら hardDrop しない

      function canUseBoardTouch() {
        return started && current && !paused && !gameOver;
      }

      /** 横に dir マス（-1 or +1）だけ移動を試みる（キーボード左右と同じ） */
      function touchTryMoveX(dir) {
        const moved = { ...current, x: current.x + dir };
        if (!collide(board, moved)) {
          current.x += dir;
          return true;
        }
        return false;
      }

      /** 指位置に応じて stepX 単位で 1 マスずつ横移動（1 touchmove 内でもループで順次処理） */
      function touchApplyHorizontalSteps(fingerX) {
        let movedAny = false;
        while (fingerX - touchAnchorX >= TOUCH_STEP_X) {
          touchTryMoveX(1);
          touchAnchorX += TOUCH_STEP_X;
          touchDidHorizontalStep = true;
          movedAny = true;
        }
        while (fingerX - touchAnchorX <= -TOUCH_STEP_X) {
          touchTryMoveX(-1);
          touchAnchorX -= TOUCH_STEP_X;
          touchDidHorizontalStep = true;
          movedAny = true;
        }
        return movedAny;
      }

      boardCanvas.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) {
          touchTrackingId = null;
          return;
        }
        const t0 = e.touches[0];
        touchTrackingId = t0.identifier;
        touchStartX = t0.clientX;
        touchStartY = t0.clientY;
        touchStartTime = performance.now();
        touchAnchorX = t0.clientX;
        touchDidHorizontalStep = false;
      }, { passive: true });

      boardCanvas.addEventListener('touchmove', (e) => {
        if (touchTrackingId === null) return;
        if (e.touches.length !== 1 || e.touches[0].identifier !== touchTrackingId) return;
        e.preventDefault();

        if (!canUseBoardTouch()) return;

        const t = e.touches[0];
        const totalDx = t.clientX - touchStartX;
        const totalDy = t.clientY - touchStartY;
        const adx = Math.abs(totalDx);
        const ady = Math.abs(totalDy);

        // まだ「タップ範囲」内なら横追従しない（誤爆防止）
        if (adx < TOUCH_TAP_MAX && ady < TOUCH_TAP_MAX) return;

        // 斜めは横優先: 横成分の方が大きいときだけドラッグ追従
        if (adx >= ady) {
          if (touchApplyHorizontalSteps(t.clientX)) drawBoard();
        }
      }, { passive: false });

      boardCanvas.addEventListener('touchcancel', () => {
        touchTrackingId = null;
      }, { passive: true });

      boardCanvas.addEventListener('touchend', (e) => {
        if (touchTrackingId === null) return;
        let t = null;
        for (let i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === touchTrackingId) {
            t = e.changedTouches[i];
            break;
          }
        }
        if (!t) return;
        touchTrackingId = null;

        // iPhone Safari: 連続タップ時のダブルタップズーム等のデフォルト動作を抑止（passive: false 必須）
        e.preventDefault();

        if (!canUseBoardTouch()) return;

        const dx = t.clientX - touchStartX;
        const dy = t.clientY - touchStartY;
        const adx = Math.abs(dx);
        const ady = Math.abs(dy);
        const duration = performance.now() - touchStartTime;
        const velocityY = dy / Math.max(duration, 1); // 下方向が正

        // 最後の touchmove が届かない場合に備え、横優勢なら離脱時も未消化の横ステップを反映
        if (!(adx < TOUCH_TAP_MAX && ady < TOUCH_TAP_MAX) && adx >= ady) {
          touchApplyHorizontalSteps(t.clientX);
        }

        // タップ：移動量が小さい → 回転（キーボードと同じウォールキック）
        if (adx < TOUCH_TAP_MAX && ady < TOUCH_TAP_MAX) {
          tryRotateWithWallKick();
          drawBoard();
          return;
        }

        // 横追従中は hardDrop しない（競合防止）
        if (touchDidHorizontalStep) {
          drawBoard();
          return;
        }

        // 縦優勢 + 十分な下距離 + 素早いスワイプ → ハードドロップ
        const verticalDominant = ady > adx;
        const quickEnough = duration <= TOUCH_DOWN_MAX_DURATION;
        const fastEnoughDown = velocityY >= TOUCH_DOWN_MIN_VELOCITY;
        if (
          verticalDominant &&
          dy >= TOUCH_DOWN_MIN_DIST &&
          quickEnough &&
          fastEnoughDown
        ) {
          hardDrop();
          drawBoard();
        } else {
          drawBoard();
        }
      }, { passive: false });

      // ボタンイベント（開始前: スタート / 開始後: ポーズ・再開）
      startBtn.addEventListener('click', () => {
        if (!started) startGame();
        else togglePause();
      });
      pauseBtn.addEventListener('click', togglePause);

      // 終了ボタン（ポーズ時オーバーレイ上）
      endBtn.addEventListener('click', () => {
        resetToInitialScreen();
      });

      // ゲームオーバー盤面オーバーレイ
      gameoverRestartBtn.addEventListener('click', () => {
        if (!gameOver) return;
        startGame();
      });

      gameoverExitBtn.addEventListener('click', () => {
        resetToInitialScreen();
      });

      // 初期状態
      board = createEmptyBoard();
      score = 0;
      level = 1;
      lines = 0;
      started = false;
      paused = false;
      gameOver = false;
      startBtn.textContent = 'スタート';
      pauseOverlay.classList.remove('is-active');
      pauseOverlay.setAttribute('aria-hidden', 'true');
      hideGameOverOverlay();
      drawBoard();
      drawNext();
      updateUI();
    });
  </script>
</body>
</html>
